name: Build and Deploy Docker Image to ECR

on:
  push:
    branches:
      - main
      - patch-11
  workflow_dispatch:

env:
  AWS_REGION: "eu-west-2"
  AWS_EC2: "flask-app"
  ECR_REPO: "docker-flask"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build_image.outputs.image_uri }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login \
            --username AWS \
            --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and Push Docker Image
        id: build_image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${GITHUB_SHA}
          echo "Building Docker image $IMAGE_URI"
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "::set-output name=image_uri::$IMAGE_URI"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 Public IP
        id: get_ip
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.AWS_EC2 }}" \
            --query 'Reservations[*].Instances[*].PublicIpAddress' \
            --output text)
          echo "::set-output name=ec2_ip::$EC2_IP"

      - name: SSH & Deploy Docker Container
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.get_ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true
          script: |
            IMAGE_URI=${{ needs.build.outputs.image_uri }}

            # Stop existing container if running
            EXISTING_CONTAINER=$(docker ps -q -f "name=flask-app")
            if [ -n "$EXISTING_CONTAINER" ]; then
              echo "Stopping existing container..."
              docker rm -f flask-app
            fi

            # Remove old image if it exists
            if docker images | grep -q "$(echo $IMAGE_URI | cut -d':' -f1)"; then
              echo "Removing old Docker image..."
              docker rmi -f $IMAGE_URI || true
            fi

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login \
              --username AWS \
              --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Run new container on port 5000
            echo "Starting new container..."
            docker run -d -p 5000:5000 --name flask-app $IMAGE_URI