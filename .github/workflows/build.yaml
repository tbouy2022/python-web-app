name: Build and Deploy Docker Image to ECR

on:
  push:
    branches:
      - main
      - patch-11
  workflow_dispatch:

env:
  AWS_REGION: "eu-west-2"
  AWS_EC2: "flask-app"
  ECR_REPO: "docker-flask"
  GIT_SHA: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login \
            --username AWS \
            --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.GIT_SHA }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 Public IP
        id: get_ip
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.AWS_EC2 }}" \
            --query 'Reservations[*].Instances[*].PublicIpAddress' \
            --output text)
          echo "EC2_PUBLIC_IP=$EC2_IP" >> "$GITHUB_ENV"
          echo "EC2 Public IP: $EC2_IP"

      - name: SSH & Deploy Docker Container
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true
          script: |
            IMAGE_URI=${{ env.IMAGE_URI }}

            # Stop and remove old container
            docker rm -f flask-app || true

            # Remove old image
            docker rmi -f $IMAGE_URI || true

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login \
              --username AWS \
              --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            # Run new container on port 5000
            docker run -d -p 5000:5000 --name flask-app $IMAGE_URI